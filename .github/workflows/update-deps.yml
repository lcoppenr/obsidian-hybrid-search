name: Weekly Dependency Update

on:
  schedule:
    - cron: '0 6 * * 1' # Every Monday at 06:00 UTC
  workflow_dispatch: # Allow manual trigger

jobs:
  update-deps:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    env:
      DEPENDENCY_UPDATE_TOKEN: ${{ secrets.DEPENDENCY_UPDATE_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Update dependencies
        run: npm update

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet package-lock.json || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Verify automation token is configured
        if: steps.changes.outputs.changed == 'true'
        run: |
          if [ -z "$DEPENDENCY_UPDATE_TOKEN" ]; then
            echo "Missing repository secret DEPENDENCY_UPDATE_TOKEN."
            echo "Use a PAT or GitHub App token so the PR triggers pull_request workflows."
            exit 1
          fi

      - name: Bump patch version
        if: steps.changes.outputs.changed == 'true'
        id: bump
        run: |
          npm version patch --no-git-tag-version
          echo "version=$(jq -r .version package.json)" >> $GITHUB_OUTPUT

      - name: Build
        if: steps.changes.outputs.changed == 'true'
        run: npm run build

      - name: Unit tests
        if: steps.changes.outputs.changed == 'true'
        run: npm test

      - name: Create Pull Request
        if: steps.changes.outputs.changed == 'true'
        id: pr
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ env.DEPENDENCY_UPDATE_TOKEN }}
          branch-token: ${{ env.DEPENDENCY_UPDATE_TOKEN }}
          commit-message: 'chore: update dependencies'
          branch: chore/update-deps
          title: 'chore: weekly dependency update'
          body: |
            Automated weekly dependency update.

            - `npm update` was run to update all dependencies within their semver ranges
            - Version bumped to `${{ steps.bump.outputs.version }}`
            - Build and unit tests passed ✅
          labels: dependencies

      - name: Enable auto-merge
        if: steps.pr.outputs.pull-request-number
        run: gh pr merge --auto --squash --delete-branch ${{ steps.pr.outputs.pull-request-number }}
        env:
          GH_TOKEN: ${{ env.DEPENDENCY_UPDATE_TOKEN }}
